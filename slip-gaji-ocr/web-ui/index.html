<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Salary Slip OCR</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172026;
        --muted: #66727c;
        --line: #d9dee3;
        --panel: #ffffff;
        --soft: #f5f7f8;
        --accent: #176b5d;
        --accent-strong: #0d4f45;
        --danger: #a33a2f;
        --warn: #8a5a00;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #eef1f3;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        letter-spacing: 0;
      }

      button,
      input {
        font: inherit;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }

      .bar {
        max-width: 1180px;
        margin: 0 auto;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        white-space: nowrap;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--warn);
      }

      .dot.ok {
        background: var(--accent);
      }

      main {
        width: 100%;
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 20px 36px;
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        gap: 20px;
      }

      section {
        min-width: 0;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .panel-head {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h2 {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
      }

      a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      .form {
        padding: 16px;
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      input[type="file"],
      input[type="password"] {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        padding: 8px 10px;
      }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      button {
        min-height: 40px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 0 14px;
        cursor: pointer;
        font-weight: 700;
      }

      button.primary {
        background: var(--accent);
        color: #fff;
      }

      button.primary:hover {
        background: var(--accent-strong);
      }

      button.secondary {
        background: var(--soft);
        border-color: var(--line);
        color: var(--ink);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      .message {
        min-height: 20px;
        color: var(--muted);
      }

      .message.error {
        color: var(--danger);
      }

      .summary-grid {
        padding: 16px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        border-bottom: 1px solid var(--line);
      }

      .metric {
        background: var(--soft);
        border-radius: 6px;
        padding: 10px;
        min-height: 64px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 20px;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 980px;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        background: #fafbfc;
      }

      td {
        line-height: 1.35;
      }

      .empty {
        padding: 32px 16px;
        color: var(--muted);
        text-align: center;
      }

      .paths {
        padding: 12px 16px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        display: grid;
        gap: 4px;
        font-size: 12px;
        word-break: break-word;
      }

      code {
        color: var(--ink);
      }

      @media (max-width: 920px) {
        .bar {
          align-items: flex-start;
          flex-direction: column;
        }

        main {
          grid-template-columns: 1fr;
        }

        .summary-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 520px) {
        .summary-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="bar">
          <h1>Salary Slip OCR</h1>
          <div class="status"><span id="healthDot" class="dot"></span><span id="healthText">Checking service</span></div>
        </div>
      </header>

      <main>
        <section class="panel">
          <div class="panel-head">
            <h2>Upload</h2>
            <a href="/docs">API docs</a>
          </div>
          <form id="parseForm" class="form">
            <label>
              PDF files
              <input id="files" name="files" type="file" accept="application/pdf,.pdf" multiple required>
            </label>
            <label>
              Password
              <input id="password" name="password" type="password" autocomplete="off">
            </label>
            <div class="actions">
              <button id="submitButton" class="primary" type="submit">Parse</button>
              <button class="secondary" type="reset">Clear</button>
            </div>
            <div id="message" class="message"></div>
          </form>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Result</h2>
            <span id="fileCount" class="message">No files parsed</span>
          </div>
          <div class="summary-grid">
            <div class="metric"><span>Documents</span><strong id="docCount">0</strong></div>
            <div class="metric"><span>Periods</span><strong id="periodCount">0</strong></div>
            <div class="metric"><span>Total Paid</span><strong id="totalPaid">0</strong></div>
            <div class="metric"><span>Errors</span><strong id="errorCount">0</strong></div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>File</th>
                  <th>Period</th>
                  <th>Name</th>
                  <th>Institution</th>
                  <th>Total Paid</th>
                  <th>Base</th>
                  <th>Allowance</th>
                  <th>Deduction</th>
                  <th>Method</th>
                </tr>
              </thead>
              <tbody id="rows">
                <tr><td class="empty" colspan="9">Waiting for upload</td></tr>
              </tbody>
            </table>
          </div>
          <div id="paths" class="paths"></div>
        </section>
      </main>
    </div>

    <script>
      const form = document.querySelector("#parseForm");
      const filesInput = document.querySelector("#files");
      const passwordInput = document.querySelector("#password");
      const button = document.querySelector("#submitButton");
      const message = document.querySelector("#message");
      const rows = document.querySelector("#rows");
      const docCount = document.querySelector("#docCount");
      const periodCount = document.querySelector("#periodCount");
      const totalPaid = document.querySelector("#totalPaid");
      const errorCount = document.querySelector("#errorCount");
      const fileCount = document.querySelector("#fileCount");
      const paths = document.querySelector("#paths");
      const healthDot = document.querySelector("#healthDot");
      const healthText = document.querySelector("#healthText");

      function text(value) {
        return value === null || value === undefined || value === "" ? "-" : String(value);
      }

      function money(value) {
        if (typeof value !== "number") return text(value);
        return new Intl.NumberFormat("id-ID").format(value);
      }

      function setMessage(value, isError = false) {
        message.textContent = value;
        message.classList.toggle("error", isError);
      }

      function setRows(documents) {
        rows.innerHTML = "";
        if (!documents.length) {
          rows.innerHTML = '<tr><td class="empty" colspan="9">No document rows</td></tr>';
          return;
        }
        for (const item of documents) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${text(item.sumber_file)}</td>
            <td>${text(item.tanggal_periode)}</td>
            <td>${text(item.nama_pekerja)}</td>
            <td>${text(item.nama_institusi)}</td>
            <td>${money(item.total_dibayar)}</td>
            <td>${money(item.gaji_pokok)}</td>
            <td>${money(item.tunjangan)}</td>
            <td>${money(item.potongan)}</td>
            <td>${text(item.metode_ekstraksi)}</td>
          `;
          rows.appendChild(tr);
        }
      }

      function setOutputPaths(outputFiles, runId) {
        if (!outputFiles) {
          paths.innerHTML = "";
          return;
        }
        paths.innerHTML = `
          <div>Run ID: <code>${text(runId)}</code></div>
          <div>Output folder: <code>${text(outputFiles.output_folder)}</code></div>
          <div>Extracted: <code>${text(outputFiles.extracted)}</code></div>
          <div>Summary: <code>${text(outputFiles.summary)}</code></div>
        `;
      }

      async function checkHealth() {
        try {
          const response = await fetch("/health");
          if (!response.ok) throw new Error("health failed");
          healthDot.classList.add("ok");
          healthText.textContent = "Service ready";
        } catch {
          healthDot.classList.remove("ok");
          healthText.textContent = "Service offline";
        }
      }

      form.addEventListener("reset", () => {
        setTimeout(() => {
          setMessage("");
          fileCount.textContent = "No files parsed";
          docCount.textContent = "0";
          periodCount.textContent = "0";
          totalPaid.textContent = "0";
          errorCount.textContent = "0";
          setRows([]);
          setOutputPaths(null);
        });
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const selectedFiles = Array.from(filesInput.files || []);
        if (!selectedFiles.length) {
          setMessage("Select at least one PDF.", true);
          return;
        }

        const payload = new FormData();
        for (const file of selectedFiles) {
          payload.append("files", file);
        }
        if (passwordInput.value) {
          payload.append("password", passwordInput.value);
        }

        button.disabled = true;
        setMessage("Parsing...");
        try {
          const response = await fetch("/parse", { method: "POST", body: payload });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || "Parse failed.");
          }
          const summary = data.summary || {};
          const documents = summary.dokumen || [];
          const errors = summary.kesalahan || [];
          const period = summary.periode || {};
          const totals = period.total || {};
          docCount.textContent = String(documents.length);
          periodCount.textContent = String(period.jumlah || 0);
          totalPaid.textContent = money(totals.total_dibayar || 0);
          errorCount.textContent = String(errors.length);
          fileCount.textContent = `${data.uploaded_files.length} file${data.uploaded_files.length === 1 ? "" : "s"}`;
          setRows(documents);
          setOutputPaths(data.output_files, data.run_id);
          setMessage(data.needs_password ? "Done, but at least one PDF needs a password." : "Done.", data.needs_password);
        } catch (error) {
          setMessage(error.message || "Parse failed.", true);
        } finally {
          button.disabled = false;
        }
      });

      checkHealth();
    </script>
  </body>
</html>
